version: '3.8'

services:
  # ── PostgreSQL Database ─────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: golf_charity_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: golf_charity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
